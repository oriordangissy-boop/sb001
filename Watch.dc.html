<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg viewBox="0 0 400 470" width="100%" height="100%" style="display:block;overflow:visible">
  <defs>
    <linearGradient id="metalSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.25)"/>
    </linearGradient>
  </defs>

  <rect x="153" y="2" width="94" height="118" rx="18" fill="{{ strapColor }}"/>
  <rect x="153" y="350" width="94" height="118" rx="18" fill="{{ strapColor }}"/>
  <rect x="153" y="2" width="94" height="118" rx="18" fill="rgba(0,0,0,0.18)"/>
  <rect x="153" y="350" width="94" height="118" rx="18" fill="rgba(0,0,0,0.18)"/>
  <line x1="166" y1="40" x2="234" y2="40" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>
  <line x1="166" y1="78" x2="234" y2="78" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>
  <line x1="166" y1="392" x2="234" y2="392" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>
  <line x1="166" y1="430" x2="234" y2="430" stroke="rgba(0,0,0,0.22)" stroke-width="1"/>

  <rect x="327" y="219" width="17" height="22" rx="3" fill="{{ crownColor }}"/>
  <rect x="327" y="219" width="17" height="22" rx="3" fill="url(#metalSheen)"/>
  <rect x="323" y="224" width="6" height="12" rx="2" fill="{{ caseDark }}"/>

  <polygon points="329.3,283.6 253.6,359.3 146.4,359.3 70.7,283.6 70.7,176.4 146.4,100.7 253.6,100.7 329.3,176.4" fill="{{ caseColor }}" stroke="{{ caseDark }}" stroke-width="2"/>
  <polygon points="329.3,283.6 253.6,359.3 146.4,359.3 70.7,283.6 70.7,176.4 146.4,100.7 253.6,100.7 329.3,176.4" fill="url(#metalSheen)"/>
  <polygon points="309,275.2 245.2,339 154.8,339 91,275.2 91,184.8 154.8,121 245.2,121 309,184.8" fill="none" stroke="{{ caseDark }}" stroke-width="1.2" opacity="0.55"/>

  <circle cx="200" cy="230" r="95" fill="{{ caseDark }}"/>
  <circle cx="200" cy="230" r="90" fill="{{ dialColor }}"/>

  {{ patternEl }}

  <circle cx="278" cy="230" r="3" fill="{{ caseColor }}"/>
  <circle cx="255.2" cy="285.2" r="3" fill="{{ caseColor }}"/>
  <circle cx="200" cy="308" r="3" fill="{{ caseColor }}"/>
  <circle cx="144.8" cy="285.2" r="3" fill="{{ caseColor }}"/>
  <circle cx="122" cy="230" r="3" fill="{{ caseColor }}"/>
  <circle cx="144.8" cy="174.8" r="3" fill="{{ caseColor }}"/>
  <rect x="197" y="148" width="6" height="14" rx="1" fill="{{ caseColor }}"/>
  <circle cx="255.2" cy="174.8" r="3" fill="{{ caseColor }}"/>

  <rect x="198.4" y="158" width="3.2" height="76" rx="1.6" fill="{{ caseColor }}"/>
  <rect x="198" y="186" width="4" height="50" rx="2" fill="{{ caseColor }}" transform="rotate(58 200 230)"/>
  <circle cx="200" cy="230" r="5.5" fill="{{ caseColor }}" stroke="{{ caseDark }}" stroke-width="1"/>
  <circle cx="200" cy="230" r="1.8" fill="{{ caseDark }}"/>

  <polygon points="329.3,283.6 253.6,359.3 146.4,359.3 70.7,283.6 70.7,176.4 146.4,100.7 253.6,100.7 329.3,176.4" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="6"/>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:360},&quot;caseColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#cfd3d8&quot;},&quot;caseDark&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9aa0a8&quot;},&quot;dialColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2c3e5c&quot;},&quot;strapColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1b1b1e&quot;},&quot;crownColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#cfd3d8&quot;},&quot;pattern&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;tapisserie&quot;,&quot;options&quot;:[&quot;tapisserie&quot;,&quot;sunburst&quot;,&quot;guilloche&quot;,&quot;skeleton&quot;,&quot;aventurine&quot;,&quot;meteorite&quot;,&quot;smooth&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props.pattern ?? 'tapisserie';
    const caseColor = this.props.caseColor ?? '#cfd3d8';
    const caseDark = this.props.caseDark ?? '#9aa0a8';
    const dialColor = this.props.dialColor ?? '#2c3e5c';
    const strapColor = this.props.strapColor ?? '#1b1b1e';
    const crownColor = this.props.crownColor ?? '#cfd3d8';
    const cx = 200, cy = 230;
    let el = null;

    if (p === 'tapisserie') {
      const lines = [];
      for (let x = 140; x <= 260; x += 10) lines.push(React.createElement('line', { key: 'v' + x, x1: x, y1: 168, x2: x, y2: 292, stroke: 'rgba(0,0,0,0.20)', strokeWidth: 1 }));
      for (let y = 168; y <= 292; y += 10) lines.push(React.createElement('line', { key: 'h' + y, x1: 140, y1: y, x2: 260, y2: y, stroke: 'rgba(0,0,0,0.20)', strokeWidth: 1 }));
      for (let x = 145; x <= 255; x += 10) lines.push(React.createElement('line', { key: 'vh' + x, x1: x, y1: 168, x2: x, y2: 292, stroke: 'rgba(255,255,255,0.06)', strokeWidth: 1 }));
      el = React.createElement('g', { clipPath: 'none' }, lines);
    } else if (p === 'sunburst') {
      const lines = [];
      for (let i = 0; i < 90; i++) {
        const a = i * 4 * Math.PI / 180;
        lines.push(React.createElement('line', { key: 's' + i, x1: cx, y1: cy, x2: cx + Math.cos(a) * 88, y2: cy + Math.sin(a) * 88, stroke: i % 2 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.10)', strokeWidth: 0.8 }));
      }
      el = React.createElement('g', {}, lines);
    } else if (p === 'guilloche') {
      const circles = [];
      for (let r = 10; r <= 86; r += 7) circles.push(React.createElement('circle', { key: 'g' + r, cx, cy, r, fill: 'none', stroke: 'rgba(0,0,0,0.16)', strokeWidth: 0.9 }));
      el = React.createElement('g', {}, circles);
    } else if (p === 'skeleton') {
      el = React.createElement('g', {}, [
        React.createElement('circle', { key: 'bg', cx, cy, r: 88, fill: '#0b0c0f' }),
        React.createElement('circle', { key: 'g1', cx: 172, cy: 200, r: 26, fill: 'none', stroke: caseColor, strokeWidth: 2, opacity: 0.5 }),
        React.createElement('circle', { key: 'g1b', cx: 172, cy: 200, r: 16, fill: 'none', stroke: caseColor, strokeWidth: 1, opacity: 0.4 }),
        React.createElement('circle', { key: 'g2', cx: 234, cy: 258, r: 22, fill: 'none', stroke: caseColor, strokeWidth: 2, opacity: 0.5 }),
        React.createElement('circle', { key: 'g3', cx: 200, cy: 280, r: 14, fill: 'none', stroke: caseColor, strokeWidth: 1.5, opacity: 0.4 }),
        React.createElement('circle', { key: 'c', cx, cy, r: 88, fill: 'none', stroke: 'rgba(255,255,255,0.08)', strokeWidth: 1 })
      ]);
    } else if (p === 'aventurine' || p === 'meteorite') {
      const dots = [];
      let seed = p === 'meteorite' ? 7 : 3;
      const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
      for (let i = 0; i < 60; i++) {
        const ang = rand() * Math.PI * 2, rad = rand() * 84;
        dots.push(React.createElement('circle', { key: 'a' + i, cx: cx + Math.cos(ang) * rad, cy: cy + Math.sin(ang) * rad, r: rand() * 0.9 + 0.3, fill: p === 'meteorite' ? 'rgba(220,220,235,0.35)' : 'rgba(255,255,255,0.7)' }));
      }
      el = React.createElement('g', {}, dots);
    }

    return { caseColor, caseDark, dialColor, strapColor, crownColor, patternEl: el };
  }
}
</script>
</body>
</html>
